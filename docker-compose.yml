services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: crime-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crime_analytics
      POSTGRES_USER: crime_user
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-CrimeSecure2024!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crime_user -d crime_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: crime-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jCrime2024!}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    mem_limit: 1g

  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: crime-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
      - cluster.name=crime-analytics
    volumes:
      - es_data:/usr/share/elasticsearch/data
    mem_limit: 1g

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: crime-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    mem_limit: 256m

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: crime-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    container_name: crime-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redisCrime2024!}
    volumes:
      - redis_data:/data
    mem_limit: 128m

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: crime-keycloak
    ports:
      - "8081:8080"
    environment:
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/crime_analytics
      KC_DB_USERNAME: crime_user
      KC_DB_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-CrimeSecure2024!}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m

volumes:
  postgres_data:
  neo4j_data:
  es_data:
  redis_data:
